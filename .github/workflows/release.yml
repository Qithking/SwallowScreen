name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  SWIFT_VERSION: "5.9"

jobs:
  build-universal:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Build arm64
        run: |
          rm -rf .build
          swift build -c release --arch arm64

      - name: Copy arm64 binary
        run: |
          mkdir -p build/arm64
          ARM64_BIN=$(find .build -name "SwallowScreen" -type f -executable 2>/dev/null | head -1)
          if [ -z "$ARM64_BIN" ]; then
            echo "Error: arm64 binary not found"
            echo "Release dir contents:"
            ls -la .build/release 2>/dev/null || true
            ls -la .build/ 2>/dev/null || true
            exit 1
          fi
          echo "Found arm64 binary: $ARM64_BIN"
          cp "$ARM64_BIN" build/arm64/

      - name: Build x86_64
        run: |
          rm -rf .build
          swift build -c release --arch x86_64

      - name: Copy x86_64 binary
        run: |
          mkdir -p build/x86_64
          X86_BIN=$(find .build -name "SwallowScreen" -type f -executable 2>/dev/null | head -1)
          if [ -z "$X86_BIN" ]; then
            echo "Error: x86_64 binary not found"
            exit 1
          fi
          echo "Found x86_64 binary: $X86_BIN"
          cp "$X86_BIN" build/x86_64/

      - name: Create Universal Binary
        run: |
          mkdir -p build/dmg
          lipo -create build/arm64/SwallowScreen build/x86_64/SwallowScreen -output build/dmg/SwallowScreen
          lipo -info build/dmg/SwallowScreen

      - name: Create App Bundle
        run: |
          mkdir -p SwallowScreen.app/Contents/MacOS
          mkdir -p SwallowScreen.app/Contents/Resources
          cp build/dmg/SwallowScreen SwallowScreen.app/Contents/MacOS/
          cp SwallowScreen/Info.plist SwallowScreen.app/Contents/
          cp -r SwallowScreen/Assets.xcassets SwallowScreen.app/Contents/Resources/
          cp SwallowScreen/HelpView.html SwallowScreen.app/Contents/Resources/
          chmod +x SwallowScreen.app/Contents/MacOS/SwallowScreen

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "SwallowScreen" \
            --window-pos 200 120 \
            --window-size 500 350 \
            --icon-size 100 \
            --icon "SwallowScreen.app" 150 175 \
            --app-drop-link 350 175 \
            --hide-extension "SwallowScreen.app" \
            "SwallowScreen-${{ github.ref_name }}-universal.dmg" \
            "SwallowScreen.app"

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## SwallowScreen

            多屏幕窗口管理工具

            ### 系统要求
            - macOS 13.0+

            ### 支持架构
            - Apple Silicon (M1/M2/M3...)
            - Intel Mac

            ### 功能
            - 固定屏幕：指定应用只能在特定屏幕移动
            - 多屏幕支持：为每个应用指定首选显示屏幕
            - 全局快捷键：快速设置前台应用的屏幕
            - 菜单栏应用：不占用 Dock 空间
          files: SwallowScreen-*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
