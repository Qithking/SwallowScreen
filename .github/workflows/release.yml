name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  SWIFT_VERSION: "5.9"
  PRODUCT_BUNDLE_IDENTIFIER: com.swallowscreen.app

jobs:
  build-universal:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Update Info.plist
        run: |
          cat > SwallowScreen/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIconName</key>
              <string>AppIcon</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${MARKETING_VERSION}</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHumanReadableCopyright</key>
              <string>Copyright © 2024. All rights reserved.</string>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
          </dict>
          </plist>
          EOF

      - name: Create Entitlements
        run: |
          cat > SwallowScreen/SwallowScreen.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.app-sandbox</key>
              <false/>
              <key>com.apple.security.automation.apple-events</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Generate Xcode Project (if needed)
        run: |
          if [ ! -f "SwallowScreen.xcodeproj/project.pbxproj" ]; then
            echo "No xcodeproj found, generating from Package.swift..."
            swift package generate-xcodeproj --output-path SwallowScreen.xcodeproj 2>&1 || true
          else
            echo "Using existing xcodeproj"
          fi
          ls -la *.xcodeproj 2>/dev/null || echo "No xcodeproj found"

      - name: Resolve Dependencies
        run: |
          if [ -f "SwallowScreen.xcodeproj/project.pbxproj" ]; then
            xcodebuild -project SwallowScreen.xcodeproj -scheme SwallowScreen -configuration Release -destination 'generic/platform=macOS' -resolvePackageDependencies 2>&1 | tail -10
          fi

      - name: Build arm64
        run: |
          rm -rf .build
          if [ -f "SwallowScreen.xcodeproj/project.pbxproj" ]; then
            xcodebuild -project SwallowScreen.xcodeproj \
              -scheme SwallowScreen \
              -configuration Release \
              -destination 'platform=macOS,arch=arm64' \
              -derivedDataPath .build \
              SWIFT_ACTIVE_COMPILATION_CONDITIONS=RELEASE \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              2>&1 | tail -30
          else
            swift build -c release --arch arm64
          fi
          
          echo "=== arm64 Build artifacts ==="
          ARM64_BIN=$(find .build -name "SwallowScreen" -type f -executable 2>/dev/null | head -1)
          echo "Found: $ARM64_BIN"
          if [ -n "$ARM64_BIN" ]; then
            file "$ARM64_BIN"
            mkdir -p build/arm64
            cp "$ARM64_BIN" build/arm64/
          fi

      - name: Build x86_64
        run: |
          rm -rf .build
          if [ -f "SwallowScreen.xcodeproj/project.pbxproj" ]; then
            xcodebuild -project SwallowScreen.xcodeproj \
              -scheme SwallowScreen \
              -configuration Release \
              -destination 'platform=macOS,arch=x86_64' \
              -derivedDataPath .build \
              SWIFT_ACTIVE_COMPILATION_CONDITIONS=RELEASE \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              2>&1 | tail -30
          else
            swift build -c release --arch x86_64
          fi
          
          echo "=== x86_64 Build artifacts ==="
          X86_BIN=$(find .build -name "SwallowScreen" -type f -executable 2>/dev/null | head -1)
          echo "Found: $X86_BIN"
          if [ -n "$X86_BIN" ]; then
            file "$X86_BIN"
            mkdir -p build/x86_64
            cp "$X86_BIN" build/x86_64/
          fi

      - name: Create Universal Binary
        run: |
          mkdir -p build/dmg
          lipo -create build/arm64/SwallowScreen build/x86_64/SwallowScreen -output build/dmg/SwallowScreen
          echo "=== Universal Binary Info ==="
          lipo -info build/dmg/SwallowScreen
          file build/dmg/SwallowScreen

      - name: Create App Bundle
        run: |
          mkdir -p SwallowScreen.app/Contents/MacOS
          mkdir -p SwallowScreen.app/Contents/Resources
          
          cp build/dmg/SwallowScreen SwallowScreen.app/Contents/MacOS/
          cp SwallowScreen/Info.plist SwallowScreen.app/Contents/
          [ -f SwallowScreen/SwallowScreen.entitlements ] && cp SwallowScreen/SwallowScreen.entitlements SwallowScreen.app/Contents/
          cp -r SwallowScreen/Assets.xcassets SwallowScreen.app/Contents/Resources/
          [ -f SwallowScreen/HelpView.html ] && cp SwallowScreen/HelpView.html SwallowScreen.app/Contents/Resources/
          
          chmod +x SwallowScreen.app/Contents/MacOS/SwallowScreen
          
          echo "=== App Bundle Contents ==="
          ls -la SwallowScreen.app/Contents/
          ls -la SwallowScreen.app/Contents/MacOS/

      - name: Create DMG
        run: |
          # Install create-dmg
          brew install create-dmg
          
          # Create a temporary source directory
          mkdir -p dmg_temp
          cp -R SwallowScreen.app dmg_temp/
          
          # Create DMG
          create-dmg \
            --volname "SwallowScreen" \
            --volsize 256 \
            --window-pos 200 120 \
            --window-size 500 350 \
            --icon-size 100 \
            --icon "SwallowScreen.app" 150 175 \
            --app-drop-link 350 175 \
            --hide-extension "SwallowScreen.app" \
            --skip-jetbrains \
            "SwallowScreen-${{ github.ref_name }}-universal.dmg" \
            "dmg_temp/"
          
          # Move DMG to root
          mv "SwallowScreen-${{ github.ref_name }}-universal.dmg" ./
          
          echo "=== DMG Created ==="
          ls -lh "SwallowScreen-${{ github.ref_name }}-universal.dmg"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## SwallowScreen

            多屏幕窗口管理工具

            ### 系统要求
            - macOS 14.0+

            ### 支持架构
            - Apple Silicon (M1/M2/M3...)
            - Intel Mac

            ### 功能
            - 固定屏幕：指定应用只能在特定屏幕移动
            - 多屏幕支持：为每个应用指定首选显示屏幕
            - 全局快捷键：快速设置前台应用的屏幕
            - 菜单栏应用：不占用 Dock 空间

            ### 安装说明
            1. 下载并打开 DMG 文件
            2. 将 SwallowScreen.app 拖入 Applications 文件夹
            3. 首次运行时需要在系统设置中授权辅助功能权限
          files: SwallowScreen-${{ github.ref_name }}-universal.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts-${{ github.ref_name }}
          path: |
            SwallowScreen.app
            SwallowScreen-${{ github.ref_name }}-universal.dmg
          retention-days: 7
