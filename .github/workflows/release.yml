name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PRODUCT_BUNDLE_IDENTIFIER: com.swallowscreen.app
  MACOSX_DEPLOYMENT_TARGET: "14.0"

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Show Xcode and SDK Info
        run: |
          xcodebuild -version
          xcodebuild -showsdks
          swift --version

      - name: Build Universal Binary
        run: |
          mkdir -p build
          
          # 构建 arm64 版本
          swift build --configuration release --arch arm64 2>&1
          
          # 查找 arm64 二进制文件 (排除 dSYM)
          ARM64_PATH=$(find .build -type f -name "SwallowScreen" -not -path "*.dSYM/*" 2>/dev/null | head -1)
          echo "=== arm64 binary: $ARM64_PATH ==="
          
          if [ -z "$ARM64_PATH" ] || [ ! -f "$ARM64_PATH" ]; then
            echo "Error: arm64 binary not found"
            exit 1
          fi
          
          cp "$ARM64_PATH" build/SwallowScreen-arm64
          
          # 构建 x86_64 版本
          swift build --configuration release --arch x86_64 2>&1
          
          # 查找 x86_64 二进制文件 (排除 dSYM)
          X86_PATH=$(find .build -type f -name "SwallowScreen" -not -path "*.dSYM/*" 2>/dev/null | head -1)
          echo "=== x86_64 binary: $X86_PATH ==="
          
          if [ -z "$X86_PATH" ] || [ ! -f "$X86_PATH" ]; then
            echo "Error: x86_64 binary not found"
            exit 1
          fi
          
          cp "$X86_PATH" build/SwallowScreen-x86_64
          
          # 合并为 Universal Binary
          lipo -create build/SwallowScreen-arm64 build/SwallowScreen-x86_64 -output build/SwallowScreen
          
          echo "=== Universal Binary Info ==="
          lipo -info build/SwallowScreen
          file build/SwallowScreen

      - name: Create App Bundle
        run: |
          # 创建 App Bundle 目录结构
          mkdir -p SwallowScreen.app/Contents/MacOS
          mkdir -p SwallowScreen.app/Contents/Resources
          
          # 复制二进制文件
          cp build/SwallowScreen SwallowScreen.app/Contents/MacOS/
          chmod +x SwallowScreen.app/Contents/MacOS/SwallowScreen
          
          # 生成 .icns 图标文件
          ICONSET_DIR="SwallowScreen.app/Contents/Resources/AppIcon.iconset"
          mkdir -p "$ICONSET_DIR"
          
          # 复制各种尺寸的图标到 iconset
          cp "SwallowScreen/Assets.xcassets/AppIcon.appiconset/16x16.png" "$ICONSET_DIR/icon_16x16.png" 2>/dev/null || true
          cp "SwallowScreen/Assets.xcassets/AppIcon.appiconset/16x16@2x.png" "$ICONSET_DIR/icon_16x16@2x.png" 2>/dev/null || true
          cp "SwallowScreen/Assets.xcassets/AppIcon.appiconset/32x32.png" "$ICONSET_DIR/icon_32x32.png" 2>/dev/null || true
          cp "SwallowScreen/Assets.xcassets/AppIcon.appiconset/32x32@2x.png" "$ICONSET_DIR/icon_32x32@2x.png" 2>/dev/null || true
          cp "SwallowScreen/Assets.xcassets/AppIcon.appiconset/128x128.png" "$ICONSET_DIR/icon_128x128.png" 2>/dev/null || true
          cp "SwallowScreen/Assets.xcassets/AppIcon.appiconset/128x128@2x.png" "$ICONSET_DIR/icon_128x128@2x.png" 2>/dev/null || true
          cp "SwallowScreen/Assets.xcassets/AppIcon.appiconset/256x256.png" "$ICONSET_DIR/icon_256x256.png" 2>/dev/null || true
          cp "SwallowScreen/Assets.xcassets/AppIcon.appiconset/256x256@2x.png" "$ICONSET_DIR/icon_256x256@2x.png" 2>/dev/null || true
          cp "SwallowScreen/Assets.xcassets/AppIcon.appiconset/512x512.png" "$ICONSET_DIR/icon_512x512.png" 2>/dev/null || true
          cp "SwallowScreen/Assets.xcassets/AppIcon.appiconset/512x512@2x.png" "$ICONSET_DIR/icon_512x512@2x.png" 2>/dev/null || true
          
          # 使用 iconutil 生成 .icns 文件
          iconutil -c icns "$ICONSET_DIR" -o "SwallowScreen.app/Contents/Resources/AppIcon.icns" 2>/dev/null || true
          rm -rf "$ICONSET_DIR"
          
          # 获取版本号
          VERSION=${GITHUB_REF#refs/tags/v}
          BUILD_NUM=$(git rev-list HEAD --count)
          
          # 创建 Info.plist
          cat > SwallowScreen.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>SwallowScreen</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleIdentifier</key>
              <string>com.swallowscreen.app</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>SwallowScreen</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>VERSION_PLACEHOLDER</string>
              <key>CFBundleVersion</key>
              <string>BUILD_PLACEHOLDER</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHumanReadableCopyright</key>
              <string>Copyright © 2024. All rights reserved.</string>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
          </dict>
          </plist>
          EOF
          
          sed -i '' "s/VERSION_PLACEHOLDER/${VERSION}/g" SwallowScreen.app/Contents/Info.plist
          sed -i '' "s/BUILD_PLACEHOLDER/${BUILD_NUM}/g" SwallowScreen.app/Contents/Info.plist
          
          echo "=== App Bundle Structure ==="
          ls -la SwallowScreen.app/Contents/
          ls -la SwallowScreen.app/Contents/Resources/

      - name: Ad-hoc Sign App
        run: |
          # 使用 ad-hoc 签名，并指定固定标识符
          codesign --force --deep --sign "SwallowScreen" SwallowScreen.app
          
          echo "=== Verify Signature ==="
          codesign -vvv SwallowScreen.app || true
          spctl --assess --type exec --verbose=2 SwallowScreen.app 2>&1 || true

      - name: Create DMG
        run: |
          brew install create-dmg
          
          mkdir -p dmg_temp
          cp -R SwallowScreen.app dmg_temp/
          
          # 使用 .icns 作为 DMG 卷图标
          ICON_PATH="dmg_temp/SwallowScreen.app/Contents/Resources/AppIcon.icns"
          
          echo "=== Using icon: $ICON_PATH ==="
          
          # 创建 DMG
          create-dmg \
            --volname "SwallowScreen" \
            --window-pos 200 120 \
            --window-size 500 350 \
            --icon "SwallowScreen.app" 150 175 \
            --app-drop-link 350 175 \
            --hide-extension "SwallowScreen.app" \
            --volicon "$ICON_PATH" \
            "SwallowScreen-${{ github.ref_name }}-universal.dmg" \
            "dmg_temp/"

          ls -la *.dmg

      - name: Generate Release Body
        id: release_body
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "$PREV_TAG"..HEAD --oneline --format='  - %s' 2>/dev/null | head -50 || echo "  - 无更新内容")
          else
            CHANGELOG=$(git log --oneline --format='  - %s' | head -20 2>/dev/null || echo "  - 无更新内容")
          fi
          
          {            
            echo "### 更新内容"
            echo "$CHANGELOG"
            echo ""           
            echo "### 安装说明"
            echo "  1. 下载并打开 DMG 文件"
            echo "  2. 将 SwallowScreen.app 拖入 Applications 文件夹"
            echo "  3. 如果提示"无法打开"，请在系统设置 > 隐私与安全性中允许运行"
            echo "  4. 如需使用快捷键功能，请在系统设置 > 隐私与安全性 > 辅助功能 中添加此应用"
            echo ""
            echo "### 系统要求"
            echo "  - macOS 14.0 (Sonoma) 或更高版本"
          } > release_body.txt
          
          cat release_body.txt

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.txt
          files: SwallowScreen-*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SwallowScreen-build
          path: |
            SwallowScreen.app
            SwallowScreen-*.dmg
          retention-days: 7
