name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PRODUCT_BUNDLE_IDENTIFIER: com.swallowscreen.app

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Prepare Resources
        run: |
          mkdir -p SwallowScreen/Assets.xcassets/AppIcon.appiconset
          
          cat > SwallowScreen/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIconName</key>
              <string>AppIcon</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${MARKETING_VERSION}</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHumanReadableCopyright</key>
              <string>Copyright © 2024. All rights reserved.</string>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
          </dict>
          </plist>
          EOF

      - name: Build
        run: |
          rm -rf .build
          swift build -c release 2>&1
          
          echo "=== Build artifacts ==="
          find .build -type f 2>/dev/null | head -20

      - name: Create App Bundle
        run: |
          mkdir -p SwallowScreen.app/Contents/MacOS
          mkdir -p SwallowScreen.app/Contents/Resources
          
          BINARY=$(find .build -name "SwallowScreen" -type f 2>/dev/null | head -1)
          if [ -z "$BINARY" ]; then
            echo "Error: binary not found"
            exit 1
          fi
          
          cp "$BINARY" SwallowScreen.app/Contents/MacOS/
          cp SwallowScreen/Info.plist SwallowScreen.app/Contents/
          cp -r SwallowScreen/Assets.xcassets SwallowScreen.app/Contents/Resources/
          [ -f SwallowScreen/HelpView.html ] && cp SwallowScreen/HelpView.html SwallowScreen.app/Contents/Resources/
          
          chmod +x SwallowScreen.app/Contents/MacOS/SwallowScreen
          
          echo "=== App Bundle Contents ==="
          ls -la SwallowScreen.app/Contents/MacOS/
          file SwallowScreen.app/Contents/MacOS/SwallowScreen

      - name: Create DMG
        run: |
          brew install create-dmg
          
          mkdir -p dmg_temp
          cp -R SwallowScreen.app dmg_temp/
          
          create-dmg \
            --volname "SwallowScreen" \
            --window-pos 200 120 \
            --window-size 500 350 \
            --icon-size 100 \
            --icon "SwallowScreen.app" 150 175 \
            --app-drop-link 350 175 \
            --hide-extension "SwallowScreen.app" \
            "SwallowScreen-${{ github.ref.name }}.dmg" \
            "dmg_temp/"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## SwallowScreen

            多屏幕窗口管理工具

            ### 系统要求
            - macOS 14.0+

            ### 支持架构
            - Apple Silicon (M1/M2/M3...)

            ### 功能
            - 固定屏幕：指定应用只能在特定屏幕移动
            - 多屏幕支持：为每个应用指定首选显示屏幕
            - 全局快捷键：快速设置前台应用的屏幕
            - 菜单栏应用：不占用 Dock 空间

            ### 安装说明
            1. 下载并打开 DMG 文件
            2. 将 SwallowScreen.app 拖入 Applications 文件夹
            3. 首次运行时需要在系统设置中授权辅助功能权限
          files: SwallowScreen-*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SwallowScreen-dmg
          path: |
            SwallowScreen.app
            SwallowScreen-*.dmg
          retention-days: 7
