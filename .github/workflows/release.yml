name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  SWIFT_VERSION: "5.9"

jobs:
  build-universal:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.swift', 'SwallowScreen/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Build Universal Binary
        run: |
          swift build -c release

      - name: Create App Bundle
        run: |
          mkdir -p SwallowScreen.app/Contents/MacOS
          mkdir -p SwallowScreen.app/Contents/Resources
          cp .build/apple/products/release/SwallowScreen SwallowScreen.app/Contents/MacOS/
          cp SwallowScreen/Info.plist SwallowScreen.app/Contents/
          cp -r SwallowScreen/Assets.xcassets SwallowScreen.app/Contents/Resources/
          cp SwallowScreen/HelpView.html SwallowScreen.app/Contents/Resources/

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "SwallowScreen" \
            --window-pos 200 120 \
            --window-size 500 350 \
            --icon-size 100 \
            --icon "SwallowScreen.app" 150 175 \
            --app-drop-link 350 175 \
            --hide-extension "SwallowScreen.app" \
            "SwallowScreen-${{ github.ref_name }}.dmg" \
            "SwallowScreen.app"

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## SwallowScreen

            多屏幕窗口管理工具

            ### 系统要求
            - macOS 13.0+

            ### 支持架构
            - Apple Silicon (M1/M2/M3...)
            - Intel Mac

            ### 功能
            - 固定屏幕：指定应用只能在特定屏幕移动
            - 多屏幕支持：为每个应用指定首选显示屏幕
            - 全局快捷键：快速设置前台应用的屏幕
            - 菜单栏应用：不占用 Dock 空间
          files: SwallowScreen-*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
