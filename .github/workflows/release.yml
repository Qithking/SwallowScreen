name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  SWIFT_VERSION: "5.9"

jobs:
  build-intel:
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Build Intel
        run: |
          swift build -c release --arch x86_64

      - name: Create App Bundle Intel
        run: |
          mkdir -p SwallowScreen.app/Contents/MacOS
          mkdir -p SwallowScreen.app/Contents/Resources
          cp .build/apple/products/release/SwallowScreen SwallowScreen.app/Contents/MacOS/
          cp SwallowScreen/Info.plist SwallowScreen.app/Contents/
          cp -r SwallowScreen/Assets.xcassets SwallowScreen.app/Contents/Resources/
          cp SwallowScreen/HelpView.html SwallowScreen.app/Contents/Resources/

      - name: Create Intel DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "SwallowScreen" \
            --window-pos 200 120 \
            --window-size 500 350 \
            --icon-size 100 \
            --icon "SwallowScreen.app" 150 175 \
            --app-drop-link 350 175 \
            --hide-extension "SwallowScreen.app" \
            "SwallowScreen-Intel-${{ github.ref_name }}.dmg" \
            "SwallowScreen.app"

      - name: Upload Intel DMG
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## SwallowScreen (Intel)

            多屏幕窗口管理工具 - Intel 版本

            ### 系统要求
            - macOS 13.0+
            - Intel 芯片 Mac
          files: SwallowScreen-Intel-*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-apple-silicon:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.swift', 'SwallowScreen/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Build Apple Silicon
        run: |
          swift build -c release --arch arm64

      - name: Create App Bundle Apple Silicon
        run: |
          mkdir -p SwallowScreen.app/Contents/MacOS
          mkdir -p SwallowScreen.app/Contents/Resources
          cp .build/apple/products/release/SwallowScreen SwallowScreen.app/Contents/MacOS/
          cp SwallowScreen/Info.plist SwallowScreen.app/Contents/
          cp -r SwallowScreen/Assets.xcassets SwallowScreen.app/Contents/Resources/
          cp SwallowScreen/HelpView.html SwallowScreen.app/Contents/Resources/

      - name: Create Apple Silicon DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "SwallowScreen" \
            --window-pos 200 120 \
            --window-size 500 350 \
            --icon-size 100 \
            --icon "SwallowScreen.app" 150 175 \
            --app-drop-link 350 175 \
            --hide-extension "SwallowScreen.app" \
            "SwallowScreen-AppleSilicon-${{ github.ref_name }}.dmg" \
            "SwallowScreen.app"

      - name: Upload Apple Silicon DMG
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## SwallowScreen (Apple Silicon)

            多屏幕窗口管理工具 - Apple Silicon 版本

            ### 系统要求
            - macOS 13.0+
            - Apple M 系列芯片 Mac
          files: SwallowScreen-AppleSilicon-*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
