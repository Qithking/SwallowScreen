name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-intel:
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Build Intel
        run: |
          xcodebuild -project SwallowScreen.xcodeproj \
            -scheme SwallowScreen \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            -arch x86_64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create Intel DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "SwallowScreen" \
            --window-pos 200 120 \
            --window-size 500 350 \
            --icon-size 100 \
            --icon "SwallowScreen.app" 150 175 \
            --app-drop-link 350 175 \
            --hide-extension "SwallowScreen.app" \
            "SwallowScreen-Intel-${{ github.ref_name }}.dmg" \
            "./DerivedData/Build/Products/Release/SwallowScreen.app"

      - name: Upload Intel DMG
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## SwallowScreen (Intel)

            多屏幕窗口管理工具 - Intel 版本

            ### 系统要求
            - macOS 13.0+
            - Intel 芯片 Mac
          files: SwallowScreen-Intel-*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-apple-silicon:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('SwallowScreen/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Build Apple Silicon
        run: |
          xcodebuild -project SwallowScreen.xcodeproj \
            -scheme SwallowScreen \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            -arch arm64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Create Apple Silicon DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "SwallowScreen" \
            --window-pos 200 120 \
            --window-size 500 350 \
            --icon-size 100 \
            --icon "SwallowScreen.app" 150 175 \
            --app-drop-link 350 175 \
            --hide-extension "SwallowScreen.app" \
            "SwallowScreen-AppleSilicon-${{ github.ref_name }}.dmg" \
            "./DerivedData/Build/Products/Release/SwallowScreen.app"

      - name: Upload Apple Silicon DMG
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## SwallowScreen (Apple Silicon)

            多屏幕窗口管理工具 - Apple Silicon 版本

            ### 系统要求
            - macOS 13.0+
            - Apple M 系列芯片 Mac
          files: SwallowScreen-AppleSilicon-*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
