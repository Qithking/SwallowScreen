name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PRODUCT_BUNDLE_IDENTIFIER: com.swallowscreen.app

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Prepare Resources
        run: |
          mkdir -p SwallowScreen/Assets.xcassets/AppIcon.appiconset
          
          cat > SwallowScreen/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIconName</key>
              <string>AppIcon</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${MARKETING_VERSION}</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHumanReadableCopyright</key>
              <string>Copyright © 2024. All rights reserved.</string>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
          </dict>
          </plist>
          EOF

      - name: Generate Xcode Project
        run: |
          # 如果没有 xcodeproj，使用 xcodegen 生成
          if [ ! -f "SwallowScreen.xcodeproj/project.pbxproj" ]; then
            brew install xcodegen
            xcodegen generate
          fi
          ls -la SwallowScreen.xcodeproj/

      - name: Build arm64
        run: |
          rm -rf .build
          xcodebuild -project SwallowScreen.xcodeproj \
            -scheme SwallowScreen \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath .build/arm64 \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS=RELEASE \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -20
          
          echo "=== arm64 artifacts ==="
          find .build/arm64 -name "SwallowScreen" -type f 2>/dev/null || echo "Not found"

      - name: Build x86_64
        run: |
          rm -rf .build/x86_64
          xcodebuild -project SwallowScreen.xcodeproj \
            -scheme SwallowScreen \
            -configuration Release \
            -destination 'platform=macOS,arch=x86_64' \
            -derivedDataPath .build/x86_64 \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS=RELEASE \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -20
          
          echo "=== x86_64 artifacts ==="
          find .build/x86_64 -name "SwallowScreen" -type f 2>/dev/null || echo "Not found"

      - name: Create Universal Binary
        run: |
          mkdir -p build
          
          ARM64_BIN=$(find .build/arm64 -name "SwallowScreen" -type f 2>/dev/null | head -1)
          X86_BIN=$(find .build/x86_64 -name "SwallowScreen" -type f 2>/dev/null | head -1)
          
          if [ -z "$ARM64_BIN" ] || [ -z "$X86_BIN" ]; then
            echo "Error: Missing binaries"
            echo "arm64: $ARM64_BIN"
            echo "x86: $X86_BIN"
            exit 1
          fi
          
          cp "$ARM64_BIN" build/SwallowScreen-arm64
          cp "$X86_BIN" build/SwallowScreen-x86
          
          lipo -create build/SwallowScreen-arm64 build/SwallowScreen-x86 -output build/SwallowScreen
          
          echo "=== Universal Binary Info ==="
          lipo -info build/SwallowScreen
          file build/SwallowScreen

      - name: Create App Bundle
        run: |
          mkdir -p SwallowScreen.app/Contents/MacOS
          mkdir -p SwallowScreen.app/Contents/Resources
          
          cp build/SwallowScreen SwallowScreen.app/Contents/MacOS/
          cp SwallowScreen/Info.plist SwallowScreen.app/Contents/
          cp -r SwallowScreen/Assets.xcassets SwallowScreen.app/Contents/Resources/
          [ -f SwallowScreen/HelpView.html ] && cp SwallowScreen/HelpView.html SwallowScreen.app/Contents/Resources/
          
          chmod +x SwallowScreen.app/Contents/MacOS/SwallowScreen
          
          echo "=== App Bundle Contents ==="
          ls -la SwallowScreen.app/Contents/MacOS/
          lipo -info SwallowScreen.app/Contents/MacOS/SwallowScreen

      - name: Create DMG
        run: |
          brew install create-dmg
          
          mkdir -p dmg_temp
          cp -R SwallowScreen.app dmg_temp/
          
          create-dmg \
            --volname "SwallowScreen" \
            --window-pos 200 120 \
            --window-size 500 350 \
            --icon-size 100 \
            --icon "SwallowScreen.app" 150 175 \
            --app-drop-link 350 175 \
            --hide-extension "SwallowScreen.app" \
            "SwallowScreen-${{ github.ref_name }}-universal.dmg" \
            "dmg_temp/"

      - name: Generate Changelog
        id: changelog
        run: |
          # 获取自上次 tag 以来的提交记录
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG=${{ github.ref_name }}
          
          echo "上次版本: $PREV_TAG"
          echo "当前版本: $CURRENT_TAG"
          
          # 生成 changelog
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "$PREV_TAG"..HEAD --oneline --format='- %s' 2>/dev/null | head -50 || echo "无更新内容")
          else
            # 首次发布，显示所有提交
            CHANGELOG=$(git log --oneline --format='- %s' | head -20 2>/dev/null || echo "无更新内容")
          fi
          
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with: |
          body: |
            ## SwallowScreen

            多屏幕窗口管理工具

            ### 系统要求
            - macOS 14.0+

            ### 支持架构
            - Apple Silicon (M1/M2/M3...)
            - Intel Mac

            ### 更新内容
            ${{ env.CHANGELOG }}

            ### 功能
            - 固定屏幕：指定应用只能在特定屏幕移动
            - 多屏幕支持：为每个应用指定首选显示屏幕
            - 全局快捷键：快速设置前台应用的屏幕
            - 菜单栏应用：不占用 Dock 空间

            ### 安装说明
            1. 下载并打开 DMG 文件
            2. 将 SwallowScreen.app 拖入 Applications 文件夹
            3. 首次运行时需要在系统设置中授权辅助功能权限
          files: SwallowScreen-*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SwallowScreen-dmg
          path: |
            SwallowScreen.app
            SwallowScreen-*.dmg
          retention-days: 7
