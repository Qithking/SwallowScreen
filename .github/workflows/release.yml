name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PRODUCT_BUNDLE_IDENTIFIER: com.swallowscreen.app
  MACOSX_DEPLOYMENT_TARGET: "14.0"

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Build Universal Binary
        run: |
          mkdir -p .build/universal
          
          # 构建 arm64 版本
          swift build --configuration release --arch arm64 2>&1
          
          # 查找 arm64 二进制文件 - 检查整个构建目录
          echo "=== .build directory structure ==="
          find .build -type f -name "SwallowScreen*" 2>/dev/null | head -20
          
          ARM64_PATH=$(find .build -type f -name "SwallowScreen" 2>/dev/null | head -1)
          if [ -z "$ARM64_PATH" ]; then
            # 尝试不同的命名模式
            ARM64_PATH=$(find .build -executable -name "*SwallowScreen*" 2>/dev/null | head -1)
          fi
          echo "=== arm64 binary: $ARM64_PATH ==="
          
          if [ -z "$ARM64_PATH" ] || [ ! -f "$ARM64_PATH" ]; then
            echo "Error: arm64 binary not found"
            exit 1
          fi
          
          cp "$ARM64_PATH" .build/universal/SwallowScreen-arm64
          
          # 构建 x86_64 版本
          rm -rf .build
          swift build --configuration release --arch x86_64 2>&1
          
          # 查找 x86_64 二进制文件
          X86_PATH=$(find .build -type f -name "SwallowScreen" 2>/dev/null | head -1)
          if [ -z "$X86_PATH" ]; then
            X86_PATH=$(find .build -executable -name "*SwallowScreen*" 2>/dev/null | head -1)
          fi
          echo "=== x86_64 binary: $X86_PATH ==="
          
          if [ -z "$X86_PATH" ] || [ ! -f "$X86_PATH" ]; then
            echo "Error: x86_64 binary not found"
            exit 1
          fi
          
          cp "$X86_PATH" .build/universal/SwallowScreen-x86_64
          
          # 合并为 Universal Binary
          lipo -create .build/universal/SwallowScreen-arm64 .build/universal/SwallowScreen-x86_64 -output .build/universal/SwallowScreen
          
          echo "=== Universal Binary Info ==="
          lipo -info .build/universal/SwallowScreen
          file .build/universal/SwallowScreen

      - name: Create App Bundle
        run: |
          # 创建 App Bundle 目录结构
          mkdir -p SwallowScreen.app/Contents/MacOS
          mkdir -p SwallowScreen.app/Contents/Resources
          mkdir -p SwallowScreen.app/Contents/Resources/Assets.xcassets/AppIcon.appiconset
          
          # 复制二进制文件
          cp .build/universal/SwallowScreen SwallowScreen.app/Contents/MacOS/
          chmod +x SwallowScreen.app/Contents/MacOS/SwallowScreen
          
          # 复制资源文件
          cp -r SwallowScreen/Assets.xcassets/* SwallowScreen.app/Contents/Resources/Assets.xcassets/
          [ -f SwallowScreen/HelpView.html ] && cp SwallowScreen/HelpView.html SwallowScreen.app/Contents/Resources/
          
          # 获取版本号
          VERSION=${GITHUB_REF#refs/tags/v}
          
          # 创建 Info.plist
          cat > SwallowScreen.app/Contents/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>SwallowScreen</string>
              <key>CFBundleIconFile</key>
              <string></string>
              <key>CFBundleIconName</key>
              <string>AppIcon</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>SwallowScreen</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>NSHumanReadableCopyright</key>
              <string>Copyright © 2024. All rights reserved.</string>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
          </dict>
          </plist>
          EOF
          
          echo "=== App Bundle Structure ==="
          ls -la SwallowScreen.app/Contents/
          ls -la SwallowScreen.app/Contents/MacOS/
          
          echo "=== Code Signature ==="
          codesign -vvv SwallowScreen.app/Contents/MacOS/SwallowScreen 2>&1 || echo "Not signed"

      - name: Ad-hoc Sign App
        run: |
          # 使用 ad-hoc 签名
          codesign --force --deep --sign - SwallowScreen.app
          
          echo "=== Verify Signature ==="
          codesign -vvv SwallowScreen.app
          spctl --assess --type exec --verbose=2 SwallowScreen.app 2>&1 || true

      - name: Create DMG
        run: |
          brew install create-dmg
          
          mkdir -p dmg_temp
          cp -R SwallowScreen.app dmg_temp/
          
          create-dmg \
            --volname "SwallowScreen" \
            --window-pos 200 120 \
            --window-size 500 350 \
            --icon-size 100 \
            --icon "SwallowScreen.app" 150 175 \
            --app-drop-link 350 175 \
            --hide-extension "SwallowScreen.app" \
            "SwallowScreen-${{ github.ref_name }}-universal.dmg" \
            "dmg_temp/"

          ls -la *.dmg

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG=${{ github.ref_name }}
          
          echo "上次版本: $PREV_TAG"
          echo "当前版本: $CURRENT_TAG"
          
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "$PREV_TAG"..HEAD --oneline --format='- %s' 2>/dev/null | head -50 || echo "无更新内容")
          else
            CHANGELOG=$(git log --oneline --format='- %s' | head -20 2>/dev/null || echo "无更新内容")
          fi
          
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with: |
          body: |
            ## SwallowScreen

            多屏幕窗口管理工具

            ### 系统要求
            - macOS 14.0+

            ### 支持架构
            - Apple Silicon (M1/M2/M3...)
            - Intel Mac

            ### 更新内容
            ${{ env.CHANGELOG }}

            ### 功能
            - 固定屏幕：指定应用只能在特定屏幕移动
            - 多屏幕支持：为每个应用指定首选显示屏幕
            - 全局快捷键：快速设置前台应用的屏幕
            - 菜单栏应用：不占用 Dock 空间

            ### 安装说明
            1. 下载并打开 DMG 文件
            2. 将 SwallowScreen.app 拖入 Applications 文件夹
            3. 如果提示"无法打开"，请在系统设置 > 隐私与安全性中允许运行
            4. 首次运行时需要在系统设置中授权辅助功能权限
          files: SwallowScreen-*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SwallowScreen-build
          path: |
            SwallowScreen.app
            SwallowScreen-*.dmg
          retention-days: 7
